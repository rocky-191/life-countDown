<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生倒计时</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 40px;
      font-size: 1rem;
    }
    
    .input-section {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 30px 40px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .input-group {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .input-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .input-item label {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 10px;
    }
    
    .quiz-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 16px;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    
    .quiz-btn:hover { opacity: 0.85; }
    
    .input-item input {
      width: 120px;
      height: 50px;
      border: 2px solid rgba(233, 69, 96, 0.5);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1.5rem;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }
    
    .input-item input:focus {
      border-color: #e94560;
    }
    
    .input-item input::placeholder {
      color: #555;
    }
    
    .result-section {
      text-align: center;
    }
    
    .main-result {
      font-size: 4rem;
      font-weight: bold;
      color: #e94560;
      margin-bottom: 5px;
    }
    
    .main-label {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 30px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 600px;
    }
    
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 25px 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: #888;
      margin-top: 8px;
    }
    
    .stat-card:nth-child(1) .stat-value { color: #e94560; }
    .stat-card:nth-child(2) .stat-value { color: #ff6b6b; }
    .stat-card:nth-child(3) .stat-value { color: #ffd93d; }
    
    .progress-section {
      margin-top: 40px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      max-width: 500px;
    }
    
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #888;
    }
    
    .progress-bar {
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 6px;
      transition: width 0.5s ease;
    }
    
    .tips {
      margin-top: 50px;
      padding: 20px;
      background: rgba(233, 69, 96, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(233, 69, 96, 0.3);
      max-width: 500px;
      text-align: center;
      color: #e94560;
      font-size: 0.9rem;
    }
    
    /* 平板适配 */
    @media (max-width: 768px) {
      body { padding: 30px 15px; }
      h1 { font-size: 2rem; }
      .subtitle { margin-bottom: 30px; }
      .input-section { padding: 25px 30px; margin-bottom: 30px; }
      .input-group { gap: 20px; }
      .main-result { font-size: 3rem; }
      .main-label { margin-bottom: 25px; }
      .stats-grid { gap: 15px; }
      .stat-card { padding: 20px 12px; }
      .stat-value { font-size: 1.6rem; }
      .progress-section { margin-top: 30px; }
      .tips { margin-top: 40px; padding: 16px; font-size: 0.85rem; }
    }

    /* 手机适配 */
    @media (max-width: 480px) {
      body { padding: 20px 12px; }
      h1 { font-size: 1.6rem; }
      .subtitle { font-size: 0.9rem; margin-bottom: 25px; }
      .input-section {
        padding: 20px;
        margin-bottom: 25px;
        border-radius: 16px;
      }
      .input-group {
        flex-direction: column;
        gap: 15px;
        align-items: stretch;
      }
      .input-item { flex-direction: row; justify-content: space-between; align-items: center; }
      .input-item label { margin-bottom: 0; }
      .input-item input {
        width: 100px;
        height: 44px;
        font-size: 1.3rem;
      }
      .quiz-btn { margin-top: 0; font-size: 0.85rem; padding: 8px 14px; }
      .main-result { font-size: 2.2rem; }
      .main-label { font-size: 1rem; margin-bottom: 20px; }
      .stats-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        max-width: 280px;
        margin: 0 auto;
      }
      .stat-card {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        padding: 15px 20px;
        flex-direction: row;
      }
      .stat-value { font-size: 1.5rem; }
      .stat-label { margin-top: 0; font-size: 0.9rem; }
      .progress-section { margin-top: 25px; }
      .progress-label { font-size: 0.85rem; }
      .tips {
        margin-top: 30px;
        padding: 14px;
        font-size: 0.8rem;
        max-width: 100%;
      }
    }

    /* 大屏幕优化 */
    @media (min-width: 1200px) {
      h1 { font-size: 3rem; }
      .main-result { font-size: 5rem; }
      .stats-grid { max-width: 700px; gap: 30px; }
      .stat-value { font-size: 2.5rem; }
      .input-section { padding: 40px 50px; }
      .tips { max-width: 600px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <h1>⏳ 人生倒计时</h1>
  <p class="subtitle">珍惜当下，不负韶华</p>
  
  <div class="input-section">
    <div class="input-group">
      <div class="input-item">
        <label>当前年龄</label>
        <input type="number" id="currentAge" placeholder="25" min="0" max="120">
      </div>
      <div class="input-item">
        <label>预计寿命</label>
        <input type="number" id="deathAge" placeholder="80" min="1" max="150">
      </div>
      <div class="input-item" style="justify-content: flex-end;">
        <a href="quiz.html" class="quiz-btn">🧬 测一测</a>
      </div>
    </div>
  </div>
  
  <div class="result-section">
    <div class="main-result" id="mainYears">-</div>
    <div class="main-label">剩余人生</div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="daysLeft">-</div>
        <div class="stat-label">天</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="hoursLeft">-</div>
        <div class="stat-label">小时</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="minutesLeft">-</div>
        <div class="stat-label">分钟</div>
      </div>
    </div>
    
    <div class="progress-section">
      <div class="progress-label">
        <span>人生进度</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
  </div>
  
  <div class="tips" id="tips">
  </div>

  <script>
    const currentAgeInput = document.getElementById('currentAge');
    const deathAgeInput = document.getElementById('deathAge');
    
    function calculate() {
      const currentAge = parseInt(currentAgeInput.value) || 0;
      const deathAge = parseInt(deathAgeInput.value) || 80;
      
      if (currentAge <= 0 || deathAge <= currentAge) {
        document.getElementById('mainYears').textContent = '-';
        document.getElementById('daysLeft').textContent = '-';
        document.getElementById('hoursLeft').textContent = '-';
        document.getElementById('minutesLeft').textContent = '-';
        document.getElementById('progressPercent').textContent = '0%';
        document.getElementById('progressFill').style.width = '0%';
        return;
      }
      
      const yearsLeft = deathAge - currentAge;
      const daysLeft = Math.floor(yearsLeft * 365.25);
      const hoursLeft = daysLeft * 24;
      const minutesLeft = hoursLeft * 60;
      
      const progress = (currentAge / deathAge * 100).toFixed(1);
      
      document.getElementById('mainYears').textContent = yearsLeft + ' 年';
      document.getElementById('daysLeft').textContent = daysLeft.toLocaleString();
      document.getElementById('hoursLeft').textContent = hoursLeft.toLocaleString();
      document.getElementById('minutesLeft').textContent = minutesLeft.toLocaleString();
      document.getElementById('progressPercent').textContent = progress + '%';
      document.getElementById('progressFill').style.width = progress + '%';
    }
    
    currentAgeInput.addEventListener('input', calculate);
    deathAgeInput.addEventListener('input', calculate);
    
    const quotes = [
      { text: "你热爱生命吗？那就别浪费时间，因为时间是生命的组成材料。", author: "本杰明·富兰克林（美国）" },
      { text: "盛年不重来，一日难再晨。及时当勉励，岁月不待人。", author: "陶渊明（东晋）" },
      { text: "人的一生是有限的，而无知却是无限的。", author: "笛卡尔（法国）" },
      { text: "时间就像海绵里的水，只要愿挤，总还是有的。", author: "鲁迅（中国）" },
      { text: "生命并不是以时间来衡量的，而是以深度来衡量的。", author: "梭罗（美国）" },
      { text: "三更灯火五更鸡，正是男儿读书时。黑发不知勤学早，白首方悔读书迟。", author: "颜真卿（唐）" },
      { text: "把每一个黎明看作是生命的开始，把每一个黄昏看作是你生命的小结。", author: "约翰·罗斯金（英国）" },
      { text: "不要等待，时机永远不会恰到好处。", author: "拿破仑·希尔（美国）" },
      { text: "人生天地之间，若白驹过隙，忽然而已。", author: "庄子（战国）" },
      { text: "你生命中的每一天，都是唯一的一天。", author: "弗吉尼亚·伍尔夫（英国）" },
      { text: "抛弃时间的人，时间也抛弃他。", author: "莎士比亚（英国）" },
      { text: "明日复明日，明日何其多！我生待明日，万事成蹉跎。", author: "钱福（明）" },
      { text: "人生苦短，及时行乐。", author: "塞内卡（古罗马）" },
      { text: "最浪费不起的是时间。", author: "丁玲（中国）" },
      { text: "凡事若能按时做，比什么和时间赛跑都更有成效。", author: "赫伯特（英国）" },
      { text: "少年易老学难成，一寸光阴不可轻。", author: "朱熹（宋）" },
      { text: "生命不等于是呼吸，生命是有动作的。", author: "伏尔泰（法国）" },
      { text: "没有人会感觉到，青春正在消逝，但任何人都会感觉到，青春已经消逝。", author: "小塞涅卡（古罗马）" },
      { text: "时间是一只永远在飞翔的鸟。", author: "梭罗（美国）" },
      { text: "浪费时间叫虚度，利用时间叫生活。", author: "爱因斯坦（美国）" }
    ];

    function showRandomQuote() {
      const random = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('tips').innerHTML = `💡 ${random.text}<br><span style="font-size:0.8rem;color:#aaa">—— ${random.author}</span>`;
    }

    showRandomQuote();

    // 默认值
    currentAgeInput.value = 30;
    deathAgeInput.value = 80;
    calculate();
  </script>
</body>
</html>
